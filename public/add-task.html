<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Form</title>
  <link rel="stylesheet" href="styles/styles.css">
  <link rel="stylesheet" href="styles/forms.css">
</head>

<body>

  <form id="task-form" method="POST">

    <!-- TASK NAME -->
    <div class="form-group">
      <label for="task-name">Task Name:</label>
      <input type="text" id="task-name" name="title" required>
    </div>

    <!-- STATUS OPTIONS -->
    <p class="section-label">Current Status:</p>

    <div class="radio-group">
      <div class="radio-option">
        <input type="radio" name="status" id="not-started" value="not_started" required>
        <label for="not-started">Not started</label>
      </div>

      <div class="radio-option">
        <input type="radio" name="status" id="in-progress" value="in_progress">
        <label for="in-progress">In progress</label>
      </div>

      <div class="radio-option">
        <input type="radio" name="status" id="completed" value="completed">
        <label for="completed">Completed</label>
      </div>
    </div>

    <!-- SUBMIT BUTTON -->
    <button type="submit" class="submit">Add Task</button>

  </form>

  <script src="js/task-form.js"></script>
</body>
</html>
